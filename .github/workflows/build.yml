name: Build Windows x64  
  
on:  
  push:  
    branches: [main]  
  pull_request:  
    branches: [main]  
  workflow_dispatch:  
  
env:  
  CMAKE_BUILD_FOLDER: .cmake-build-release  
  CMAKE_BUILD_PARALLEL_LEVEL: 4  
  VISUAL_STUDIO_PLATFORM_TOOLSET: v143  
  CMAKE_GENERATOR: Ninja Multi-Config  
  
jobs:  
  build-windows:  
    runs-on: windows-2022  
  
    steps:  
      - name: Checkout repository  
        uses: actions/checkout@v4  
  
      - name: Clone and bootstrap vcpkg  
        shell: pwsh  
        run: |  
          New-Item -ItemType Directory -Force -Path "vendor/github.com/microsoft"  
          git clone https://github.com/microsoft/vcpkg.git vendor/github.com/microsoft/vcpkg  
          git -C vendor/github.com/microsoft/vcpkg checkout 242ac6932a9cd2607332969129e9572516f28d65  
          vendor\github.com\microsoft\vcpkg\bootstrap-vcpkg.bat -disableMetrics  
  
      - name: Clone carbonengine/vcpkg-registry  
        shell: pwsh  
        run: |  
          New-Item -ItemType Directory -Force -Path "vendor/github.com/carbonengine"  
          git clone https://github.com/carbonengine/vcpkg-registry.git vendor/github.com/carbonengine/vcpkg-registry  
  
      - name: Diagnostic - print triplet and toolchain files  
        shell: pwsh  
        run: |  
          Write-Host "=== VISUAL_STUDIO_PLATFORM_TOOLSET=$env:VISUAL_STUDIO_PLATFORM_TOOLSET ==="  
          Write-Host "=== x64-windows-release.cmake ==="  
          Get-Content vendor/github.com/carbonengine/vcpkg-registry/triplets/x64-windows-release.cmake  
          Write-Host "=== x64-windows-carbon.cmake ==="  
          Get-Content vendor/github.com/carbonengine/vcpkg-registry/toolchains/x64-windows-carbon.cmake  
  
      - name: Patch vcpkg-configuration.json SSH URL to HTTPS  
        shell: pwsh  
        run: (Get-Content vcpkg-configuration.json) -replace 'git@github\.com:carbonengine/vcpkg-registry\.git', 'https://github.com/carbonengine/vcpkg-registry.git' | Set-Content vcpkg-configuration.json  
  
      - name: Export vcpkg binary cache environment variables  
        uses: actions/github-script@v7  
        with:  
          script: |  
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');  
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');  
  
      - name: Set up MSVC x64 environment  
        uses: ilammy/msvc-dev-cmd@v1  
        with:  
          arch: x64  
  
      - name: Configure CMake  
        shell: pwsh  
        env:  
          VCPKG_BINARY_SOURCES: clear;x-gha,readwrite  
          X_VCPKG_REGISTRIES_CACHE: ${{ github.workspace }}\regcache  
        run: |  
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\regcache"  
          cmake --preset x64-windows-release -S . -B ${{ env.CMAKE_BUILD_FOLDER }} -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\.build-artifact" -DVCPKG_INSTALL_OPTIONS="--x-buildtrees-root=${{ github.workspace }}\buildtrees" -DBUILD_DX11=ON -DBUILD_DX12=ON -DBUILD_SHADER_COMPILER=ON  
  
      - name: Build  
        shell: pwsh  
        env:  
          VCPKG_BINARY_SOURCES: clear;x-gha,readwrite  
        run: cmake --build ${{ env.CMAKE_BUILD_FOLDER }} --config Release  
  
      - name: Install  
        shell: pwsh  
        run: cmake --install ${{ env.CMAKE_BUILD_FOLDER }} --config Release  
  
      - name: Upload artifact  
        uses: actions/upload-artifact@v4  
        with:  
          name: trinity-windows-x64-release  
          path: ${{ github.workspace }}\.build-artifact
